  <style>:root{color-scheme:light;--bg: #efe4d1;--panel: rgba(255, 251, 245, .78);--panel-strong: rgba(255, 253, 249, .96);--line: rgba(51, 30, 14, .12);--ink: #1f140d;--muted: #6d5846;--accent: #cc5f1d;--accent-soft: #f6c56a;--accent-deep: #7e2c0a;--accent-ink: #fff8ef;--shadow: 0 24px 80px rgba(99, 57, 15, .12);font-family:Georgia,Iowan Old Style,Palatino Linotype,serif}*{box-sizing:border-box}html,body,#root{min-height:100%;margin:0}body{background:radial-gradient(circle at top left,rgba(246,197,106,.5),transparent 28%),radial-gradient(circle at 85% 10%,rgba(204,95,29,.18),transparent 24%),linear-gradient(180deg,#fbf4e8 0%,var(--bg) 44%,#e7d4ba 100%);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}.app-shell{position:relative;overflow:hidden;padding:20px}.ambient{position:absolute;border-radius:999px;filter:blur(22px);opacity:.55;pointer-events:none}.ambient-left{top:80px;left:-90px;width:180px;height:180px;background:#f8b54a73}.ambient-right{top:160px;right:-60px;width:210px;height:210px;background:#d8662e38}.hero,.workspace{width:min(1180px,100%);margin:0 auto}.hero{display:grid;grid-template-columns:1.45fr .95fr;gap:20px;margin-bottom:20px}.hero-copy,.hero-panel,.panel{-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);background:var(--panel);border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow);padding:26px}.eyebrow,.panel-kicker{margin:0 0 10px;font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent-deep);font-family:Segoe UI Variable Text,Avenir Next,sans-serif}.hero-topline{display:flex;justify-content:space-between;gap:14px;align-items:center}.hero-status{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;background:#7e2c0a14;color:var(--accent-deep);font-size:.82rem;font-family:Segoe UI Variable Text,Avenir Next,sans-serif}.hero-status.subtle{background:#1f140d0a;color:var(--muted)}.hero h1,.panel h2,.selected-variant h3{margin:0;line-height:.96}.hero h1{font-size:clamp(2.8rem,6vw,5.2rem);max-width:11ch;letter-spacing:-.04em}.hero-text{max-width:58ch;margin:18px 0 0;font-size:1.04rem;color:var(--muted);line-height:1.7}.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:22px}.metric-card{padding:16px;border-radius:20px;background:#ffffff80;border:1px solid rgba(126,44,10,.08)}.metric-value{display:block;font-size:1.7rem;font-weight:700;font-family:Segoe UI Variable Display,Avenir Next,sans-serif}.metric-label,.variant-card p,.selected-summary,.history-meta,.status{color:var(--muted)}.hero-panel-header{display:flex;flex-wrap:wrap;gap:10px}.pill{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;font-size:.82rem;background:#d8662e1f;color:var(--accent-deep);font-family:Segoe UI Variable Text,Avenir Next,sans-serif}.pill.muted{background:#23170d0f;color:var(--muted)}.hero-stack{margin-top:18px;display:grid;gap:12px}.stack-card{padding:16px 18px;border-radius:20px;background:linear-gradient(180deg,#ffffff8f,#ffffff52);border:1px solid rgba(126,44,10,.08)}.stack-card strong{display:block;line-height:1.35}.stack-label{display:block;margin-bottom:6px;color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.12em;font-family:Segoe UI Variable Text,Avenir Next,sans-serif}.workspace,.builder-form,.results-layout,.grid,.variant-list{display:grid;gap:18px}.workspace-grid{grid-template-columns:minmax(340px,.92fr) minmax(0,1.08fr);align-items:start}.composer-panel{position:sticky;top:18px}.workspace-span{grid-column:1 / -1}.panel-heading{display:flex;justify-content:space-between;gap:16px;align-items:start;margin-bottom:18px}.panel-heading h2{font-size:clamp(1.45rem,2vw,2rem);letter-spacing:-.02em}.starter-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;margin-bottom:18px}.starter-chip{min-width:240px;padding:14px 16px;border-radius:18px;border:1px solid rgba(126,44,10,.12);background:linear-gradient(180deg,#ffffff9e,#fffaf34d
